<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TV Fast</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: purple;
            color: #121212;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: white;
            font-size: 22px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 420px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-right: 20px;
            gap: 15px;
            white-space: nowrap;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: white;
            color: #000000;
        }
        .channel-icon {
            width: 65px;
            height: 65px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0;
        }
        #hidden-player {
            display: none;
        }
    </style>
</head>
<body>

    <h1> beIN MAX Fast TV</h1>

    <div class="container">
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 HD</span>
        </button>
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 SD</span>
        </button>
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 HD</span>
        </button>
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 SD</span>
        </button>
    </div>

    <video id="hidden-player" controls playsinline></video>

    <script>
        function startStream(url) {
            var video = document.getElementById('hidden-player');
            video.src = url;
            video.load();
            
            video.play().then(() => {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                }
            }).catch(e => {
                window.open(url, '_blank');
            });
            
            clearInterval(window.streamKeeper);
            window.streamKeeper = setInterval(function() {
                var req = new XMLHttpRequest();
                req.open('GET', url + '?anti_drop=' + new Date().getTime(), true);
                req.send();
            }, 8000);
        }
    </script>

</body>
</html>
