    <script>
        var playerInstance;

        function startStream(url) {
            var videoEl = document.getElementById('hidden-player');
            var containerEl = document.getElementById('player-container');
            
            // تهيئة المشغل لأول مرة
            if (!playerInstance) {
                playerInstance = videojs(videoEl, {
                    html5: {
                        vhs: { overrideNative: true }
                    }
                });
            }

            // تفعيل البروكسي لتخطي قيود CORS لحزم m3u8
            var targetUrl = url;
            if (url.includes('.m3u8')) {
                targetUrl = "https://corsproxy.io?" + encodeURIComponent(url);
            }

            // تحديد نوع البث تلقائياً
            playerInstance.src({
                src: targetUrl,
                type: url.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4'
            });

            playerInstance.ready(function() {
                // طلب ملء الشاشة للحاوية أو للمشغل مباشرة لضمان العمل على الأندرويد والآيفون
                if (playerInstance.requestFullscreen) {
                    playerInstance.requestFullscreen();
                } else if (videoEl.webkitEnterFullscreen) {
                    videoEl.webkitEnterFullscreen(); // مخصص لهواتف الآيفون
                }
                
                // تشغيل البث تلقائياً
                playerInstance.play().catch(function(error) {
                    console.log("الانتقال لملء الشاشة مطلوب لبدء الصوت والبث.");
                });
            });

            // مراقب البث الصامت لمنع الانقطاع
            clearInterval(window.streamKeeper);
            window.streamKeeper = setInterval(function() {
                fetch(url, { method: 'HEAD', mode: 'no-cors' }).catch(e => {});
            }, 60000);
        }
    </script>
