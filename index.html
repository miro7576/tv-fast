<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TV Fast</title>
    
    <!-- الروابط الرسمية الكاملة والمستقرة لمشغل Video.js -->
    <link href="https://zencdn.net" rel="stylesheet" />
    <script src="https://zencdn.net"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: purple;
            color: #121212;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: white;
            font-size: 22px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 420px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-right: 20px;
            gap: 15px;
            white-space: nowrap;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: white;
            color: #000000;
        }
        .channel-icon {
            width: 65px;
            height: 65px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0;
        }
        /* إخفاء ذكي للمشغل داخل الصفحة لحماية التصميم مع السماح بملء الشاشة */
        .video-wrapper {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h1>beIN MAX Fast TV</h1>                   
    <div class="container">
        <!-- روابط قنواتك الحقيقية الأصلية جاهزة للعمل -->
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 HD</span>
        </button>
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 SD</span>
        </button>
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 HD</span>
        </button>
        <button class="btn" onclick="startStream('http://asmrasmr.live')">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 SD</span>
        </button>
    </div>

    <!-- حاوية المشغل المخفية ديناميكياً -->
    <div class="video-wrapper" id="player-container">
        <video id="hidden-player" class="video-js vjs-default-skin" controls playsinline></video>
    </div>

    <script>
        var playerInstance;

        function startStream(url) {
            var containerEl = document.getElementById('player-container');
            
            if (playerInstance) {
                try { playerInstance.dispose(); } catch(e) {}
                playerInstance = null;
                containerEl.innerHTML = '<video id="hidden-player" class="video-js vjs-default-skin" controls playsinline></video>';
            }

            var videoEl = document.getElementById('hidden-player');

            // 💡 استخدام البروكسي الخارجي المفتوح والمجاني بالكامل لتخطي حظر HTTPS دون دفع سنت واحد لـ Render
            var targetUrl = "https://allorigins.win" + encodeURIComponent(url);

            playerInstance = videojs(videoEl, {
                html5: { vhs: { overrideNative: true } }
            });

            playerInstance.src({
                src: targetUrl,
                type: 'application/x-mpegURL'
            });

            playerInstance.ready(function() {
                // تفعيل وضع ملء الشاشة الفوري والمباشر
                if (videoEl.webkitEnterFullscreen) {
                    videoEl.webkitEnterFullscreen(); // للآيفون وسفاري
                } else if (playerInstance.requestFullscreen) {
                    playerInstance.requestFullscreen(); // للأندرويد وكروم
                }
                
                playerInstance.play().catch(function(error) {
                    console.log("تفاعل ملء الشاشة مطلوب لبدء البث.");
                });
            });

            clearInterval(window.streamKeeper);
            window.streamKeeper = setInterval(function() {
                fetch(url, { method: 'HEAD', mode: 'no-cors' }).catch(e => {});
            }, 60000);
        }
    </script>

</body>
</html>
