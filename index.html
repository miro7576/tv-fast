<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TV Fast</title>
    <!-- تم إدراج الرابط الصحيح والمكتمل هنا ليعمل البث بثبات تامة -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:   purple     ;
            color: #121212;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: white;
            font-size: 22px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: ;
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 420px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-right: 20px;
            gap: 15px;
            white-space: nowrap;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: white;
            color: #000000;
        }
        .channel-icon {
            width: 65px;
            height: 65px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0;
        }
        #hidden-video {
            display: none;
        }
    </style>
</head>
<body>
    <h1> beIN MAX Fast TV</h1>
    <div class="container">
        <!-- روابط البث المباشر الكاملة مع كود التثبيت خلف الكواليس -->
        <a class="btn" href="http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8" onclick="stabilizeStream(event, this.href)" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 HD</span>
        </a>
        <a class="btn" href="http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8" onclick="stabilizeStream(event, this.href)" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 SD</span>
        </a>
        <a class="btn" href="http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8" onclick="stabilizeStream(event, this.href)" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 HD</span>
        </a>
        <a class="btn" href="http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8" onclick="stabilizeStream(event, this.href)" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 SD</span>
        </a>
    </div>

    <video id="hidden-video"></video>

    <script>
        function stabilizeStream(event, url) {
            var video = document.getElementById('hidden-video');
            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                var hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    manifestLoadingMaxRetry: 10,
                    manifestLoadingRetryDelay: 500
                });
                hls.loadSource(url);
                hls.attachMedia(video);
            }
        }
    </script>
</body>
</html>
