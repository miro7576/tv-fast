<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر - TV FAST</title>
    <!-- استدعاء مشغل HLS الذكي لتسريع تحميل القنوات وتخطي البطء -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        header h1 {
            color: #ff0000;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(255, 0, 0, 0.3);
        }
        video { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            display: block;
            background: #000;
        }
    </style>
</head>
<body>

    <header>
        <h1>TV FAST</h1>
    </header>

    <div class="main-container">
        <div class="player-wrapper">
            <!-- مشغل الفيديو الافتراضي المطور -->
            <video id="video" controls autoplay playsinline></video>
        </div>
    </div>

    <script>
        var video = document.getElementById('video');
        // استخدام رابط البروكسي الداخلي السريع لتمرير البث بدون تهنيج
        var streamUrl = "/proxy?url=" + encodeURIComponent("http://asmrasmr.live");

        if (Hls.isSupported()) {
            var hls = new Hls({
                maxBufferLength: 10, // تحديد حجم التخزين المؤقت لتفادي البطء
                enableWorker: true
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // دعم متصفحات آيفون وسفاري تلقائياً
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        } else {
            // تجربة تشغيل الرابط كملف مباشر في حال فشل صيغ البث المباشر الأخرى
            video.src = streamUrl;
        }
    </script>
</body>
</html>
