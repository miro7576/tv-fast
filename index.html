<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Fast</title>
    <!-- تضمين المكتبة البرمجية لتثبيت ومنع توقف بث سيرفرات الـ IPTV -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #121212;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: #ff9800;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .player-container {
            margin: 15px auto;
            max-width: 600px;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 85%;
            max-width: 400px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover, .btn.active {
            background-color: #ff9800;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1>بث قنوات beIN SPORTS MAX</h1>
    
    <!-- المشغل الداخلي الذكي للمتصفح -->
    <div class="player-container">
        <video id="webPlayer" controls autoplay playsinline></video>
    </div>

    <div class="container">
        <button class="btn" onclick="playInternal('http://asmrasmr.live', this)">beIN SPORTS MAX 1 HD</button>
        <button class="btn" onclick="playInternal('http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8', this)">beIN SPORTS MAX 1 SD</button>
        <button class="btn" onclick="playInternal('http://asmrasmr.live', this)">beIN SPORTS MAX 2 HD</button>
        <button class="btn" onclick="playInternal('http://asmrasmr.live', this)">beIN SPORTS MAX 2 SD</button>
        <button class="btn" onclick="alert('هذه القناة غير متوفرة حالياً وسيتم إضافة الرابط قريباً')">beIN MAX 4K</button>
    </div>

    <script>
        var video = document.getElementById('webPlayer');
        var hls;

        function playInternal(url, element) {
            var buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                
                // إعدادات متقدمة لمنع السيرفر من قطع البث بعد 10 ثوانٍ وثبات التغذية
                hls = new Hls({
                    maxBufferLength: 30,
                    liveSyncDuration: 3,
                    manifestLoadingMaxRetry: 10,
                    levelLoadingMaxRetry: 10
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                // معالجة الأخطاء وإعادة الاتصال التلقائي في حال حاول السيرفر طرد المتصفح
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                break;
                        }
                    }
                });

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(e) { console.log("Play blocked by browser policy"); });
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // دعم أجهزة آبل والأنظمة المتوافقة أصلياً
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // تشغيل القناة الأولى تلقائياً عند فتح الموقع
        window.onload = function() {
            var firstChannel = document.querySelector('.btn');
            if (firstChannel) firstChannel.click();
        }
    </script>

</body>
</html>
