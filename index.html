<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر - TV FAST</title>
    <!-- استدعاء مكتبة مشغل Clappr وتخطي الـ CORS -->
    <script type="text/javascript" src="https://jsdelivr.net"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        header h1 {
            color: #ff0000;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(255, 0, 0, 0.3);
        }
        /* جعل المشغل متجاوب بالكامل مع شاشات الهواتف */
        #player { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
        }
    </style>
</head>
<body>

    <header>
        <h1>TV FAST</h1>
    </header>

    <div class="main-container">
        <div class="player-wrapper">
            <!-- حاوية المشغل -->
            <div id="player"></div>
        </div>
    </div>

    <script>
        // تشغيل البث المباشر مباشرة عبر المتصفح باستخدام Clappr
        var player = new Clappr.Player({
            source: "/proxy?url=http://asmrasmr.live",
            parentId: "#player",
            preload: 'auto',
            autoPlay: true,
            width: '100%',
            height: '100%'
        });
    </script>
</body>
</html>
