<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TV Fast</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #121212;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: #ff9800;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 10px 15px;
            font-size: 16px; /* تصغير طفيف لضمان البقاء في سطر واحد مع الأيقونة الكبيرة */
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 420px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* محاذاة تبدأ من اليمين بشكل مرتب */
            padding-right: 20px;
            gap: 15px;
            white-space: nowrap; /* إجبار النص على البقاء في سطر واحد تماماً */
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #ff9800;
            color: #000000;
        }
        /* تكبير حجم الأيقونات مع الحفاظ على التناسق */
        .channel-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0; /* منع انضغاط الصورة */
        }
    </style>
</head>
<body>
    <h1>بث قنوات beIN SPORTS MAX</h1>
    <div class="container">
        <!-- beIN SPORTS MAX 1 HD -->
        <a class="btn" href="http://asmrasmr.live" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 HD</span>
        </a>
        <!-- beIN SPORTS MAX 1 SD -->
        <a class="btn" href="http://asmrasmr.live" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein1.png" alt="MAX 1" class="channel-icon">
            <span>beIN SPORTS MAX 1 SD</span>
        </a>
        <!-- beIN SPORTS MAX 2 HD -->
        <a class="btn" href="http://asmrasmr.live" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 HD</span>
        </a>
        <!-- beIN SPORTS MAX 2 SD -->
        <a class="btn" href="http://asmrasmr.live" target="_blank" rel="noopener noreferrer">
            <img src="/static/bein2.png" alt="MAX 2" class="channel-icon">
            <span>beIN SPORTS MAX 2 SD</span>
        </a>
    </div>
</body>
</html>
