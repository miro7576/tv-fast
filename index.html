<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAST - Mido TV المشغل</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; text-align: center; }
        header { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #e50914; }
        header h1 { color: #e50914; font-size: 28px; letter-spacing: 1px; }
        header p { color: #aaa; font-size: 14px; margin-top: 5px; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .channel-card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: transform 0.2s, border-color 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .channel-card:hover { transform: translateY(-5px); border-color: #e50914; }
        .channel-name { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #f5f5f5; }
        .badge { display: inline-block; padding: 4px 8px; font-size: 12px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; }
        .hd { background-color: #007bff; color: white; }
        .sd { background-color: #28a745; color: white; }
        .play-btn { width: 100%; background: #e50914; color: white; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; text-decoration: none; display: inline-block; transition: background 0.2s; box-shadow: 0 4px 10px rgba(229, 9, 20, 0.3); border: none; cursor: pointer; }
        .play-btn:hover { background: #b80710; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
        video { width: 100%; height: 100%; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(229, 9, 20, 0.8); color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <div id="video-container">
        <button class="close-btn" onclick="closeVideo()">✕ إغلاق البث</button>
        <video id="main-player" controls autoplay playsinline></video>
    </div>

    <header>
        <h1>TV FAST</h1>
        <p>اختر القناة للمشاهدة الفورية بملء الشاشة</p>
    </header>

    <div class="channels-grid">
        <!-- القناة 1: beIN SPORTS MAX 1 HD -->
        <div class="channel-card">
            <div class="channel-name">beIN SPORTS MAX 1 HD</div>
            <span class="badge hd">HD HIGH QUALITY</span>
            <button onclick="playChannel('http://asmrasmr.live:8080/live/638109080/95827171997/1246118.m3u8')" class="play-btn">▶ شاهد الان</button>
        </div>

        <!-- القناة 2: beIN SPORTS MAX 1 SD -->
        <div class="channel-card">
            <div class="channel-name">beIN SPORTS MAX 1 SD</div>
            <span class="badge sd">SD LOW QUALITY</span>
            <button onclick="playChannel('http://asmrasmr.live:8080/live/638109080/95827171997/1246118.m3u8')" class="play-btn">▶ شاهد الأن</button>
        </div>

        <!-- القناة 3: beIN SPORTS MAX 2 HD -->
        <div class="channel-card">
            <div class="channel-name">beIN SPORTS MAX 2 HD</div>
            <span class="badge hd">HD HIGH QUALITY</span>
            <button onclick="playChannel('http://asmrasmr.live:8080/live/638109080/95827171997/1246118.m3u8')" class="play-btn">▶ شاهد الأن</button>
        </div>

        <!-- القناة 4: beIN SPORTS MAX 2 SD -->
        <div class="channel-card">
            <div class="channel-name">beIN SPORTS MAX 2 SD</div>
            <span class="badge sd">SD LOW QUALITY</span>
            <button onclick="playChannel('http://asmrasmr.live:8080/live/638109080/95827171997/1246118.m3u8')" class="play-btn">▶ شاهد الأن</button>
        </div>
    </div>

    <script>
        function playChannel(originalUrl) {
            const currentHost = window.location.origin;
            const proxyUrl = currentHost + "/proxy?url=" + encodeURIComponent(originalUrl);
            const container = document.getElementById('video-container');
            const player = document.getElementById('main-player');
            container.style.display = 'block';
            player.src = proxyUrl;
            player.play();
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }
        function closeVideo() {
            const container = document.getElementById('video-container');
            const player = document.getElementById('main-player');
            player.pause();
            player.src = "";
            container.style.display = 'none';
            if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
