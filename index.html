<!DOCTYPE html>

<head>

        }
        h1 {
            color: #ff9800;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            width: 85%;
            max-width: 400px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #ff9800;
