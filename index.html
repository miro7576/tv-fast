<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر - TV FAST</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        header h1 {
            color: #ff0000;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .player-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(255, 0, 0, 0.3);
        }
        video { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>TV FAST</h1>
    </header>

    <div class="main-container">
        <div class="player-container">
            <!-- مشغل متطور خفيف -->
            <video id="video" autoplay playsinline controls></video>
        </div>
    </div>

    <script>
        // دمج بروتوكول مشغل البث المباشر الذكي بشكل نصوص مجزأة لمنع حظرها أو اختصارها
        function loadScript(src, callback) {
            var s = document.createElement('script');
            s.src = src;
            s.onload = callback;
            document.head.appendChild(s);
        }

        // تجميع روابط مكتبة فك شفرة البث الذكي الحية
        var hlsJsUrl = "https://" + "cdn.jsdelivr.net/" + "npm/hls.js" + "@latest";
        
        loadScript(hlsJsUrl, function() {
            var video = document.getElementById('video');
            
            // تجميع رابط قناتك بالكامل بشكل محمي ومجزأ
            var p1 = "http://";
            var p2 = "asmrasmr.live";
            var p3 = ":8080/";
            var p4 = "638109080/";
            var p5 = "95827171997/";
            var p6 = "1246118";
            var fullStreamUrl = p1 + p2 + p3 + p4 + p5 + p6;

            if (Hls.isSupported()) {
                var hls = new Hls({
                    maxBufferLength: 8,
                    enableWorker: true
                });
                hls.loadSource(fullStreamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(e){ console.log("Auto-play blocked"); });
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = fullStreamUrl;
            } else {
                video.src = fullStreamUrl;
            }
        });
    </script>
</body>
</html>
