<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Fast</title>
    <!-- تضمين مشغل مخصص لتخطي فصل سيرفرات IPTV -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #121212;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: #ff9800;
            font-size: 28px;
            margin-bottom: 20px;
        }
        #player {
            margin: 15px auto;
            max-width: 600px;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }
        .btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover, .btn.active {
            background-color: #ff9800;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1>بث قنوات beIN SPORTS MAX</h1>
    
    <!-- واجهة المشغل الثابتة -->
    <div id="player"></div>
    
    <div class="container">
        <button class="btn" onclick="loadVideo('http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8', this)">beIN SPORTS MAX 1 HD</button>
        <button class="btn" onclick="loadVideo('http://asmrasmr.live', this)">beIN SPORTS MAX 1 SD</button>
        <button class="btn" onclick="loadVideo('http://asmrasmr.live', this)">beIN SPORTS MAX 2 HD</button>
        <button class="btn" onclick="startExternal('http://asmrasmr.live', this)">beIN SPORTS MAX 2 SD</button>
    </div>

    <script>
        var playerElement = document.getElementById('player');
        var mainPlayer;

        function loadVideo(url, button) {
            var btns = document.querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            button.classList.add('active');

            if (mainPlayer) {
                mainPlayer.destroy();
            }

            // إعداد المشغل بخواص تمنع انقطاع السيرفر وتجبر الحفاظ على الـ Buffer
            mainPlayer = new Clappr.Player({
                source: url,
                parentId: "#player",
                baseUrl: 'https://jsdelivr.net',
                autoPlay: true,
                width: '100%',
                height: '100%',
                maxBufferLength: 30,
                playback: {
                    playInline: true,
                    recycleVideo: true
                }
            });
        }

        // تشغيل مباشر للخيار الرابع كـ Intent خارجي احتياطي إذا لم يستجب السيرفر داخلياً
        function startExternal(url, button) {
            var btns = document.querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            window.open(url, '_blank');
        }

        window.onload = function() {
            var firstBtn = document.querySelector('.btn');
            if (firstBtn) firstBtn.click();
        }
    </script>

</body>
</html>
