<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Fast</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: #ff9800;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .player-box {
            margin: 15px auto;
            max-width: 600px;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ff9800;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover, .btn.active {
            background-color: #ff9800;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1>بث قنوات beIN SPORTS MAX</h1>

    <!-- مشغل المتصفح المدمج والخفيف جداً -->
    <div class="player-box">
        <video id="myVideo" controls autoplay playsinline></video>
    </div>

    <div class="container">
        <button class="btn" onclick="playChannel('http://asmrasmr.live:8080/live/638109080/95827171997/1246128.m3u8', this)">beIN SPORTS MAX 1 HD</button>
        <button class="btn" onclick="playChannel('http://asmrasmr.live', this)">beIN SPORTS MAX 1 SD</button>
        <button class="btn" onclick="playChannel('http://asmrasmr.live', this)">beIN SPORTS MAX 2 HD</button>
        <button class="btn" onclick="playChannel('http://asmrasmr.live', this)">beIN SPORTS MAX 2 SD</button>
    </div>

    <script>
        var videoElement = document.getElementById('myVideo');
        var currentUrl = '';

        function playChannel(url, button) {
            currentUrl = url;
            
            // تمييز الزر النشط
            var btns = document.querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            button.classList.add('active');

            // تشغيل الرابط في المشغل المدمج
            videoElement.src = url;
            videoElement.load();
            videoElement.play().catch(e => console.log("تحتاج للضغط على تشغيل"));
        }

        // كود ذكي: إذا توقف السيرفر أو قطع الاتصال، يتم إعادة التشغيل تلقائياً فوراً
        videoElement.addEventListener('error', function() {
            if (currentUrl) {
                console.log("تم رصد انقطاع السيرفر، إعادة الاتصال التلقائي...");
                setTimeout(function() {
                    videoElement.src = currentUrl;
                    videoElement.load();
                    videoElement.play();
                }, 500); // إعادة محاولة الاتصال خلال نصف ثانية فقط
            }
        }, true);

        // تشغيل القناة الأولى تلقائياً عند فتح الصفحة
        window.onload = function() {
            var firstBtn = document.querySelector('.btn');
            if (firstBtn) firstBtn.click();
        }
    </script>

</body>
</html>
