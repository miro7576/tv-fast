<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Fast</title>
    <!-- استدعاء مشغل مخصص وخفيف لتشغيل روابط m3u8 داخل المتصفح مباشرة -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }
        h1 {
            color: #ff9800;
            font-size: 28px;
            margin-bottom: 20px;
        }
        #player {
            margin: 15px auto;
            max-width: 600px;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ff9800;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }
        .btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover, .btn.active {
            background-color: #ff9800;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1>بث قنوات beIN SPORTS MAX</h1>

    <!-- المشغل المدمج داخل المتصفح -->
    <div id="player"></div>

    <div class="container">
        <button class="btn" onclick="loadVideo('http://asmrasmr.live', this)">beIN SPORTS MAX 1 HD</button>
        <button class="btn" onclick="loadVideo('http://asmrasmr.live', this)">beIN SPORTS MAX 1 SD</button>
        <button class="btn" onclick="loadVideo('http://asmrasmr.live', this)">beIN SPORTS MAX 2 HD</button>
        <button class="btn" onclick="loadVideo('http://asmrasmr.live', this)">beIN SPORTS MAX 2 SD</button>
    </div>

    <script>
        var mainPlayer = null;

        function loadVideo(url, button) {
            var btns = document.querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            button.classList.add('active');

            if (mainPlayer) {
                mainPlayer.destroy();
            }

            // إعداد المشغل لكسر حماية الـ 5 ثوانٍ عبر التحديث الذكي والـ Buffer العالي
            mainPlayer = new Clappr.Player({
                source: url,
                parentId: "#player",
                autoPlay: true,
                width: '100%',
                height: '100%',
                preload: 'auto',
                hlsMinimumConfig: {
                    maxBufferLength: 40,        // تخزين 40 ثانية مسبقاً لتفادي الانقطاع
                    maxMaxBufferLength: 90,
                    liveBackBufferLength: 10,
                    enableWorker: true,
                    manifestLoadingMaxRetry: 10, // إعادة المحاولة خلفياً فوراً إذا فصل السيرفر
                    manifestLoadingRetryDelay: 500
                },
                playback: {
                    playInline: true,
                    recycleVideo: true
                }
            });
        }

        window.onload = function() {
            var firstBtn = document.querySelector('.btn');
            if (firstBtn) firstBtn.click();
        }
    </script>

</body>
</html>
